name: CI – Test, Build & Release

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write   # needed to create/update releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
# JOB 1 – Run unit tests (Linux is fast & cheap)
# ──────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ──────────────────────────────────────────────
  # JOB 2 – Build EXEs on Windows (only if tests pass)
  # ──────────────────────────────────────────────
  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build TireStorageManager.exe
        run: pyinstaller TireStorageManager.spec --noconfirm

      - name: Copy app EXE into payload
        run: |
          Copy-Item "dist\TireStorageManager.exe" -Destination "payload\TireStorageManager.exe" -Force
        shell: pwsh

      - name: Build TSM-Installer.exe
        run: pyinstaller TSM-Installer.spec --noconfirm

      # ── Smoke-test the built EXEs ──
      - name: Smoke-test TireStorageManager.exe
        run: |
          # Start the app in background, wait for it to bind, then check HTTP
          $proc = Start-Process -FilePath "dist\TireStorageManager.exe" `
            -ArgumentList "--port","59123","--host","127.0.0.1","--data-dir","$env:RUNNER_TEMP\tsm_smoke" `
            -PassThru -NoNewWindow
          # Give it up to 30 s to start
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:59123/" -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          # Clean up
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Error "TireStorageManager.exe did not respond on :59123 within 30 s"
            exit 1
          }
          Write-Host "✓ Smoke test passed – EXE responded with HTTP 200"
        shell: pwsh

      - name: Read version from config.py
        id: version
        run: |
          $ver = python tools/get_version.py
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload TireStorageManager.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TireStorageManager
          path: dist/TireStorageManager.exe

      - name: Upload TSM-Installer.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TSM-Installer
          path: dist/TSM-Installer.exe

    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}

  # ──────────────────────────────────────────────
  # JOB 3 – Create / update GitHub Release (master only)
  # ──────────────────────────────────────────────
  release:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: TSM-Installer
          path: release-assets

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: TireStorageManager
          path: release-assets

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.app_version }}
          name: "TireStorageManager v${{ needs.build.outputs.app_version }}"
          body: |
            ## TireStorageManager v${{ needs.build.outputs.app_version }}

            **Automatisch erstellt durch CI-Pipeline.**

            ### Downloads
            | Datei | Beschreibung |
            |-------|-------------|
            | `TSM-Installer.exe` | Installer/Deinstaller mit GUI |
            | `TireStorageManager.exe` | Standalone-Anwendung (ohne Installer) |

            ### Änderungen
            Siehe [Commit-Historie](https://github.com/${{ github.repository }}/commits/master).
          files: |
            release-assets/TSM-Installer.exe
            release-assets/TireStorageManager.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
