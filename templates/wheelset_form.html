{% extends 'base.html' %}
{% block content %}
<h3>{{ _("wf_title_edit") if editing else _("wf_title_new") }}</h3>
<form method="post" class="row g-3" id="wheelsetForm">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-6">
        <label class="form-label">{{ _("wf_customer") }} *</label>
        <input type="text" class="form-control" name="customer_name" required
            value="{{ w.customer_name if w else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label" for="license_plate">{{ _("wf_plate") }} *</label>
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-car-front-fill"></i></span>
            <input type="text"
                   class="form-control text-uppercase font-monospace"
                   id="license_plate"
                   name="license_plate"
                   required
                   autocomplete="off"
                   spellcheck="false"
                   maxlength="15"
                   placeholder="z. B. B-TB 3005"
                   value="{{ w.license_plate if w else '' }}"
                   aria-describedby="plateFeedback">
        </div>
        <div id="plateFeedback" class="form-text plate-hint">
            {{ _("wf_plate_hint") }}
        </div>
        <div class="invalid-feedback" id="plateError">
            {{ _("wf_plate_invalid") }}
        </div>
    </div>
    <div class="col-md-6">
        <label class="form-label">{{ _("wf_car") }} *</label>
        <input type="text" class="form-control" name="car_type" required value="{{ w.car_type if w else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">{{ _("wf_position") }} *</label>
        <select class="form-select pos-select" name="storage_position" required>
            {% if suggested and not editing %}
            <option value="{{ suggested }}">{{ suggested }}</option>
            {% endif %}
            <optgroup label="Container">
                {% for p in positions if p.startswith('C') %}
                <option value="{{ p }}" {% if w and w.storage_position==p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </optgroup>
            <optgroup label="Garage">
                {% for p in positions if p.startswith('GR') %}
                <option value="{{ p }}" {% if w and w.storage_position==p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </optgroup>
        </select>
    </div>
    <div class="col-12">
        <label class="form-label">{{ _("wf_note") }}</label>
        <textarea class="form-control" name="note" rows="3">{{ (w.note or '') if w else '' }}</textarea>
    </div>
    <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit"><i class="bi bi-check2-circle"></i> {{ _("wf_save") }}</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('list_wheelsets') }}">{{ _("wf_cancel") }}</a>
    </div>
</form>
{% endblock %}
