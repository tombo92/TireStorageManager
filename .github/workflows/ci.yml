name: CI – Bump, Test, Build & Release

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.py'
      - 'templates/**'
      - 'static/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # needed for version bump commits, tags, and releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# JOB 1 – Bump VERSION in config.py and push the commit
#   • develop push → patch bump  (1.2.3 → 1.2.4)
#   • master  push → minor bump  (1.2.3 → 1.3.0), then sync to develop
#   • pull_request → skipped (no bump on PRs)
# ──────────────────────────────────────────────────────────────
jobs:
  bump:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.NEW_VERSION }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump version in config.py
        id: bump
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            NEW_VERSION=$(python tools/bump_version.py --minor)
          else
            NEW_VERSION=$(python tools/bump_version.py)
          fi
          echo "NEW_VERSION=$NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit, tag & push
        run: |
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.py
          git commit -m "chore(version): bump to ${{ steps.bump.outputs.NEW_VERSION }} [skip ci]"
          git tag -a "v${{ steps.bump.outputs.NEW_VERSION }}" \
                    -m "Release ${{ steps.bump.outputs.NEW_VERSION }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.NEW_VERSION }}"

      - name: Sync bumped version back to develop (master only)
        if: github.ref_name == 'master'
        run: |
          git fetch origin develop
          git checkout develop
          BUMP_SHA=$(git rev-parse origin/master)
          git cherry-pick "$BUMP_SHA" || true
          if ! git diff --quiet; then
            git add config.py
            git cherry-pick --continue --no-edit || true
          fi
          git push origin HEAD:develop

  # ──────────────────────────────────────────────────────────────
  # JOB 2 – Run unit tests  (runs after bump; also runs on PRs)
  # ──────────────────────────────────────────────────────────────
  test:
    needs: [ bump ]
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # For push events, check out the bump commit (has new version);
          # for PRs the bump job was skipped so HEAD is the PR branch.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ──────────────────────────────────────────────────────────────
  # JOB 3 – Build EXEs on Windows  (only on push, after tests pass)
  # ──────────────────────────────────────────────────────────────
  build:
    needs: [ bump, test ]
    if: github.event_name == 'push' && needs.test.result == 'success'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # includes the bump commit

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build TireStorageManager.exe
        run: pyinstaller TireStorageManager.spec --noconfirm

      - name: Copy app EXE into payload
        shell: pwsh
        run: |
          Copy-Item "dist\TireStorageManager.exe" `
            -Destination "payload\TireStorageManager.exe" -Force

      - name: Build TSM-Installer.exe
        run: pyinstaller TSM-Installer.spec --noconfirm

      - name: Smoke-test TireStorageManager.exe
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\TireStorageManager.exe" `
            -ArgumentList "--port","59123","--host","127.0.0.1",
                          "--data-dir","$env:RUNNER_TEMP\tsm_smoke" `
            -PassThru -NoNewWindow
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:59123/" `
                     -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Error "EXE did not respond on :59123 within 30 s"
            exit 1
          }
          Write-Host "✓ Smoke test passed"

      - name: Read version from config.py
        id: version
        shell: pwsh
        run: |
          $ver = python tools/get_version.py
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload TireStorageManager.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TireStorageManager
          path: dist/TireStorageManager.exe

      - name: Upload TSM-Installer.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TSM-Installer
          path: dist/TSM-Installer.exe

    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}

  # ──────────────────────────────────────────────────────────────
  # JOB 4 – Create GitHub Release  (master only, after build)
  # ──────────────────────────────────────────────────────────────
  release:
    needs: [ build ]
    if: github.ref_name == 'master' && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: TSM-Installer
          path: release-assets

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: TireStorageManager
          path: release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.app_version }}
          name: "TireStorageManager v${{ needs.build.outputs.app_version }}"
          body: |
            ## TireStorageManager v${{ needs.build.outputs.app_version }}

            **Automatisch erstellt durch CI-Pipeline.**

            ### Downloads
            | Datei | Beschreibung |
            |-------|-------------|
            | `TSM-Installer.exe` | Installer/Deinstaller mit GUI |
            | `TireStorageManager.exe` | Standalone-Anwendung (ohne Installer) |

            ### Änderungen
            Siehe [Commit-Historie](https://github.com/${{ github.repository }}/commits/main).
          files: |
            release-assets/TSM-Installer.exe
            release-assets/TireStorageManager.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
