name: CI – Bump, Test, Build & Release

on:
  push:
    paths:
      - '**.py'
      - 'templates/**'
      - 'static/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**.py'
      - 'templates/**'
      - 'static/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'

permissions:
  contents: write   # needed for version bump commits, tags, and releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# JOB 0 – Detect whether app source files changed
#   Only changes to tsm/, templates/, static/ or config.py
#   should trigger a version bump.  Tool/docs/installer changes
#   still trigger tests and build but NOT a version bump.
# ──────────────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      installer: ${{ steps.filter.outputs.installer }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'tsm/**'
              - 'templates/**'
              - 'static/**'
              - 'config.py'
              - 'requirements.txt'
            installer:
              - 'installer/**'


  # ──────────────────────────────────────────────────────────────
  # JOB 1 – Run unit tests  (every push & PR, all branches)
  # ──────────────────────────────────────────────────────────────
  test:
    needs: [ changes ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ──────────────────────────────────────────────────────────────
  # JOB 1b – Installer smoke tests
  #   Runs only when installer/ files changed.  Uses the same Linux
  #   runner as the main test job; Tkinter and winreg are stubbed.
  # ──────────────────────────────────────────────────────────────
  test-installer:
    needs: [ changes ]
    if: needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Run installer smoke tests
        run: python -m pytest tests/test_installer_smoke.py -v --tb=short
  # ──────────────────────────────────────────────────────────────
  # JOB 2 – Build EXEs on Windows  (only on push, after tests pass)
  # ──────────────────────────────────────────────────────────────
  build:
    needs: [ test ]
    if: >
      github.event_name == 'push' &&
      needs.test.result == 'success'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build TireStorageManager.exe
        run: pyinstaller TireStorageManager.spec --noconfirm

      - name: Copy app EXE into payload
        shell: pwsh
        run: |
          Copy-Item "dist\TireStorageManager.exe" `
            -Destination "payload\TireStorageManager.exe" -Force

      - name: Mark develop builds as pre-release
        if: github.ref_name == 'develop'
        shell: pwsh
        run: |
          # Marker file bundled into the installer payload so the
          # installer GUI and the app EXE both know they are test builds
          New-Item -ItemType File -Path "payload\PRERELEASE" -Force
          echo "TSM_PRERELEASE=1" >> $env:GITHUB_ENV

      - name: Build TSM-Installer.exe
        run: pyinstaller installer/TSM-Installer.spec --noconfirm

      - name: Smoke-test TireStorageManager.exe
        shell: pwsh
        run: |
          # --no-update prevents the EXE from self-updating and exiting
          # before the HTTP probe can connect.
          $proc = Start-Process -FilePath "dist\TireStorageManager.exe" `
            -ArgumentList "--port","59123","--host","127.0.0.1",
                          "--data-dir","$env:RUNNER_TEMP\tsm_smoke",
                          "--no-update" `
            -PassThru -NoNewWindow

          # ── Wait for the server to come up (up to 30 s) ─────────────
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:59123/" `
                     -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          if (-not $ok) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Write-Error "EXE did not respond on :59123 within 30 s"
            exit 1
          }
          Write-Host "EXE is up – running full smoke test suite ..."

          # ── Full HTTP smoke test (stdlib-only Python) ─────────────────
          python tools/smoke_test.py `
            --base-url  http://127.0.0.1:59123 `
            --exe-path  dist\TireStorageManager.exe `
            --data-dir  "$env:RUNNER_TEMP\tsm_smoke" `
            --port      59123
          $smokeExit = $LASTEXITCODE

          # ── Tear down EXE ─────────────────────────────────────────────
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

          if ($smokeExit -ne 0) {
            Write-Error "Smoke test suite reported failures (exit $smokeExit)"
            exit 1
          }
          Write-Host "All smoke tests passed."

      - name: Sign EXEs (self-signed certificate)
        if: env.CODE_SIGN_PFX_BASE64 != ''
        shell: pwsh
        env:
          CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          CODE_SIGN_PASSWORD:   ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          # Write PFX from secret
          $bytes = [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64)
          $pfx   = "$env:RUNNER_TEMP\tsm_codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)

          # Locate signtool.exe (comes with Windows SDK on windows-latest)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          $ts  = "http://timestamp.digicert.com"
          $pwd = $env:CODE_SIGN_PASSWORD

          foreach ($exe in @("dist\TireStorageManager.exe", "dist\TSM-Installer.exe")) {
            & $signtool sign /f $pfx /p $pwd /fd sha256 /td sha256 /tr $ts $exe
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $exe" }
            Write-Host "✓ Signed: $exe"
          }

          Remove-Item $pfx -Force

      - name: Read version from config.py
        id: version
        shell: pwsh
        run: |
          $ver = python tools/get_version.py
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload TireStorageManager.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TireStorageManager
          path: dist/TireStorageManager.exe

      - name: Upload TSM-Installer.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TSM-Installer
          path: dist/TSM-Installer.exe

    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}

  # ──────────────────────────────────────────────────────────────
  # JOB 3 – Bump VERSION in config.py  (only after build passes,
  #          only on master/develop pushes)
  #   • develop push → patch bump  (1.2.3 → 1.2.4)
  #   • master  push → minor bump  (1.2.3 → 1.3.0), then sync to develop
  # ──────────────────────────────────────────────────────────────
  bump:
    needs: [ changes, build ]
    if: >
      needs.build.result == 'success' &&
      needs.changes.outputs.app == 'true' &&
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]' &&
      (github.ref_name == 'master' || github.ref_name == 'develop')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.NEW_VERSION }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump version in config.py
        id: bump
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            NEW_VERSION=$(python tools/bump_version.py --minor)
          else
            NEW_VERSION=$(python tools/bump_version.py)
          fi
          echo "NEW_VERSION=$NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit, tag & push
        run: |
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.py CHANGELOG.md
          git commit -m "chore(version): bump to ${{ steps.bump.outputs.NEW_VERSION }} [skip ci]"
          git tag -a "v${{ steps.bump.outputs.NEW_VERSION }}" \
                    -m "Release ${{ steps.bump.outputs.NEW_VERSION }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.NEW_VERSION }}"

      - name: Sync bumped version back to develop (master only)
        if: github.ref_name == 'master'
        run: |
          git fetch origin develop
          git checkout develop
          BUMP_SHA=$(git rev-parse origin/master)
          git cherry-pick "$BUMP_SHA" || true
          if ! git diff --quiet; then
            git add config.py
            git cherry-pick --continue --no-edit || true
          fi
          git push origin HEAD:develop

  # ──────────────────────────────────────────────────────────────
  # JOB 4 – Create GitHub Release
  #   master  → official release  (prerelease: false)
  #   develop → test release      (prerelease: true, tag: v…-dev)
  # ──────────────────────────────────────────────────────────────
  release:
    needs: [ build, bump ]
    if: >
      needs.build.result == 'success' &&
      needs.bump.result == 'success' &&
      (github.ref_name == 'master' || github.ref_name == 'develop')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract changelog notes
        id: changelog
        run: |
          NOTES=$(python tools/extract_changelog.py "${{ needs.bump.outputs.new_version }}")
          if [ -z "$NOTES" ]; then
            NOTES="Siehe [Commit-Historie](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})."
          fi
          # Write multi-line string to GITHUB_OUTPUT
          {
            echo "NOTES<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: TSM-Installer
          path: release-assets

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: TireStorageManager
          path: release-assets

      - name: Set release metadata
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=v${{ needs.bump.outputs.new_version }}" >> $GITHUB_OUTPUT
            echo "name=TireStorageManager v${{ needs.bump.outputs.new_version }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "body_prefix=" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ needs.bump.outputs.new_version }}-dev" >> $GITHUB_OUTPUT
            echo "name=⚠ TEST v${{ needs.bump.outputs.new_version }}-dev (develop)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            printf 'body_prefix=> ⚠ **TEST-BUILD** – Nicht für den produktiven Einsatz.\n' >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            ${{ steps.meta.outputs.body_prefix }}
            ## TireStorageManager v${{ needs.bump.outputs.new_version }}

            ${{ steps.changelog.outputs.NOTES }}

            ---
            ### Downloads
            | Datei | Beschreibung |
            |-------|-------------|
            | `TSM-Installer.exe` | Installer/Deinstaller mit GUI |
            | `TireStorageManager.exe` | Standalone-Anwendung (ohne Installer) |
          files: |
            release-assets/TSM-Installer.exe
            release-assets/TireStorageManager.exe
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ github.ref_name == 'master' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
